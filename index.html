<!DOCTYPE html>
<html>
<body>
<h2>ESP32 Remote Switch</h2>

<button onclick="setState('ON')">Turn ON</button>
<button onclick="setState('OFF')">Turn OFF</button>

<script>
async function setState(value) {
    const url = "https://api.github.com/repos/ThumbsUpMate/esp32-remote/contents/state.txt";

    const response = await fetch(url);
    const data = await response.json();

    const update = {
        message: "Update state",
        content: btoa(value),
        sha: data.sha
    };

    await fetch(url, {
        method: "PUT",
        mode: "cors",
        headers: {
            "Authorization": "Bearer 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",
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28"
        },
        body: JSON.stringify(update)
    });

    alert("State set to " + value);
}
</script>
</body>
</html>
